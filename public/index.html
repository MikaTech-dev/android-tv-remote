<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="A sleek, locally-hosted web application to control your Android TV over the network. Built by Mikatech-dev.">
    <meta property="og:description"
        content="A sleek, locally-hosted web application to control your Android TV over the network. Built by Mikatech-dev.">
    <meta property="og:image"
        content="https://64.media.tumblr.com/22e6a0b0169ec5b862cabb5af60279d0/ea35ccda43be97cd-f7/s540x810/f66c3a04dd9529405cb76ea804947aab1ca7efb3.pnj">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image"
        content="https://64.media.tumblr.com/22e6a0b0169ec5b862cabb5af60279d0/ea35ccda43be97cd-f7/s540x810/f66c3a04dd9529405cb76ea804947aab1ca7efb3.pnj">
    <title>TV Remote</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <header>
            <div class="brand-title">Android TV Remote</div>
            <div id="status-indicator" class="status disconnected"><span class="status-dot"></span> Disconnected</div>
        </header>

        <main>
            <!-- Setup Section -->
            <section id="setup-section" class="panel">
                <div class="panel-header">
                    <h2>Network Connection</h2>
                    <p class="panel-subtitle">Enter your device IP to connect to it.</p>
                </div>

                <div class="input-group">
                    <input type="text" id="tv-ip" placeholder="e.g. 192.168.1.50">
                    <button id="btn-connect" class="primary-btn">Connect</button>
                </div>

                <div id="recent-ips-container" class="hidden recent-section">
                    <p class="recent-label">Recent Devices</p>
                    <div id="recent-ips-list" class="recent-list"></div>
                </div>

                <div id="pairing-section" class="hidden pairing-box">
                    <p class="pairing-label">Authentication required. Enter the PIN displayed on your device.</p>
                    <div class="input-group">
                        <input type="text" id="pairing-code" placeholder="6-digit PIN">
                        <button id="btn-pair" class="primary-btn">Authenticate</button>
                    </div>
                </div>
            </section>

            <!-- Remote Section -->
            <section id="remote-section" class="hidden panel">
                <div class="remote-top">
                    <button class="icon-btn" data-key="POWER" title="Power"><i class="ph ph-power"></i></button>
                    <button class="icon-btn" data-key="MUTE" title="Mute"><i class="ph ph-speaker-slash"></i></button>
                </div>

                <div class="dpad">
                    <button class="dpad-btn up" data-key="DPAD_UP">▲</button>
                    <button class="dpad-btn left" data-key="DPAD_LEFT">◀</button>
                    <button class="dpad-btn center" data-key="DPAD_CENTER">OK</button>
                    <button class="dpad-btn right" data-key="DPAD_RIGHT">▶</button>
                    <button class="dpad-btn down" data-key="DPAD_DOWN">▼</button>
                </div>

                <div class="remote-bottom">
                    <button class="action-btn" data-key="BACK">Back</button>
                    <button class="action-btn" data-key="HOME">Home</button>
                </div>

                <div class="volume-controls">
                    <button class="vol-btn" data-key="VOLUME_DOWN">-</button>
                    <span class="vol-label">VOL</span>
                    <button class="vol-btn" data-key="VOLUME_UP">+</button>
                </div>

                <div class="disconnect-wrapper">
                    <button class="action-btn danger-btn" id="btn-disconnect">Disconnect</button>
                </div>
        </main>
    </div>

    <footer class="app-footer">
        <div class="footer-content">
            <div>Made with 💜 by Mikatech</div>
            <p>©
                <script>document.write(new Date().getFullYear())</script> All rights reserved.
            </p>
        </div>
    </footer>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>

    <div class="github-wrapper" tabindex="0">
        <button class="github-float" title="View Source on GitHub">
            <i class="ph ph-github-logo"></i>
        </button>
        <div class="github-popup">
            <a href="https://github.com/MikaTech-dev/android-tv-remote" target="_blank" class="github-link">
                <span>View this project's repo</span>
                <i class="ph ph-arrow-up-right"></i>
            </a>
            <a href="https://github.com/louis49/androidtv-remote" target="_blank" class="github-link">
                <span>Louis49</span>
                <i class="ph ph-arrow-up-right"></i>
            </a>
        </div>
    </div>
</body>

</html>
